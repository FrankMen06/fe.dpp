<header class="app-header bg-white border-bottom shadow-sm px-4 py-3">
  <div class="d-flex align-items-center justify-content-between gap-3">
    <div class="d-flex align-items-center gap-3">
      <div class="brand-logo rounded-4 shadow-sm bg-light d-flex align-items-center justify-content-center overflow-hidden">
        <img
          src="/assets/LogoCampomesa.jpeg"
          alt="CampoMesa Logo"
          class="img-fluid"
        />
      </div>

      <div>
        <h1 class="h4 fw-bold text-dark mb-1">
          CampoMesa
        </h1>

        <p class="text-secondary mb-0 small">
          Panel administrativo de pedidos y productos
        </p>
      </div>
    </div>

    <div class="d-none d-md-flex align-items-center gap-3">
      <div class="input-group search-wrapper">
        <span class="input-group-text bg-light border-0">
          <i class="bi bi-search text-secondary"></i>
        </span>

        <input
          type="text"
          class="form-control bg-light border-0"
          placeholder="Buscar pedidos, productos..."
        />
      </div>

      <button class="btn btn-light rounded-4 shadow-sm">
        <i class="bi bi-bell text-secondary"></i>
      </button>
    </div>
  </div>
</header>
